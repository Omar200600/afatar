<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Axis - Real Human Avatar Test</title>
    <!-- مكتبة A-Frame -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <!-- مكتبة تشغيل أنيميشن والحركات للمجسمات -->
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: sans-serif; background: #000; }
        .interface-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; }
        .interactive { pointer-events: auto; }
        .control-panel { position: absolute; background: rgba(255, 255, 255, 0.9); border-radius: 15px; padding: 8px; display: flex; gap: 5px; }
        .btn { background: #f4f4f5; border: 1px solid #ccc; border-radius: 8px; padding: 8px 12px; font-size: 0.9rem; cursor: pointer; }
        .btn:active { background: #38bdf8; color: white; }
        #avatar-panel { top: 10px; left: 50%; transform: translateX(-50%); }
        #nav-panel { bottom: 15px; left: 50%; transform: translateX(-50%); flex-direction: column; align-items: center; }
    </style>
</head>
<body>

    <a-scene embedded vr-mode-ui="enabled: false">
        <a-light type="ambient" color="#ffffff" intensity="1.5"></a-light>
        <a-light type="directional" color="#ffffff" intensity="1.0" position="5 10 5"></a-light>

        <!-- الكاميرا -->
        <a-entity id="camera-rig" position="0 0 5">
            <a-entity id="main-camera" camera look-controls="magicWindowTrackingEnabled: true; touchEnabled: true"></a-entity>
        </a-entity>

        <!-- 👤 أفتار بشري حقيقي متحرك جاهز خفيف للغاية (GLB) -->
        <a-entity id="real-avatar" 
                  gltf-model="https://models.readyplayer.me/6460d37574a3827772873a20.glb" 
                  position="0 0 0" 
                  rotation="0 0 0" 
                  scale="1 1 1"
                  animation-mixer>
        </a-entity>

        <!-- الأرضية -->
        <a-plane position="0 0 0" rotation="-90 0 0" width="20" height="20" color="#e2e8f0"></a-plane>
    </a-scene>

    <div class="interface-layer">
        <!-- تحريك الأفتار الحقيقي -->
        <div id="avatar-panel" class="control-panel interactive">
            <button class="btn" id="av-fwd">🚶‍♂️ تقديم الأفتار</button>
            <button class="btn" id="av-back">🚶‍♂️ إرجاع الأفتار</button>
            <button class="btn" id="av-rot">🔄 تدوير</button>
        </div>
    </div>

    <script>
        const avatar = document.getElementById('real-avatar');
        
        function moveAvatar(dx, dz) {
            let pos = avatar.getAttribute('position');
            pos.x += dx;
            pos.z += dz;
            avatar.setAttribute('position', pos);
        }

        function rotateAvatar(angle) {
            let rot = avatar.getAttribute('rotation');
            rot.y += angle;
            avatar.setAttribute('rotation', rot);
        }

        document.getElementById('av-fwd').addEventListener('click', () => moveAvatar(0, -0.2));
        document.getElementById('av-back').addEventListener('click', () => moveAvatar(0, 0.2));
        document.getElementById('av-rot').addEventListener('click', () => rotateAvatar(15));
    </script>
</body>
</html>
