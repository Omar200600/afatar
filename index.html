<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Axis - College High Clearance Unified Doors</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Arial, sans-serif;
            user-select: none;
            -webkit-user-select: none;
            background-color: #000;
        }

        /* ----------------------------------------------------------------- */
        /* 📱 واجهة المستخدم والأزرار الثابتة لضمان الظهور الدائم             */
        /* ----------------------------------------------------------------- */
        .interface-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
        }

        .interactive {
            pointer-events: auto;
        }

        #welcome-overlay {
            position: absolute;
            top: 12%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(24, 24, 27, 0.85);
            color: white;
            padding: 12px 25px;
            text-align: center;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.25);
            max-width: 85%;
        }

        #welcome-overlay h1 { font-size: 1.3rem; margin: 0 0 5px 0; }
        #welcome-overlay p { font-size: 0.85rem; margin: 0; color: #e4e4e7; }

        .control-panel {
            position: absolute;
            background-color: rgba(255, 255, 255, 0.94);
            border-radius: 20px;
            padding: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            display: flex;
            gap: 8px;
        }

        .btn {
            background-color: #f4f4f5;
            border: 1px solid #e4e4e7;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.3rem;
            color: #27272a;
            cursor: pointer;
            transition: background-color 0.1s, transform 0.05s;
            width: 48px;
            height: 48px;
        }

        .btn:active {
            background-color: #38bdf8;
            color: white;
            transform: scale(0.95);
        }

        #movement-panel {
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            flex-direction: column;
            align-items: center;
        }

        .row { display: flex; gap: 8px; }
        #altitude-panel { left: 15px; bottom: 30px; flex-direction: column; }
        #rotation-panel { right: 15px; bottom: 30px; flex-direction: column; }

        /* لوحة التحكم الخاصة بالافتار */
        #avatar-control-panel {
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(15, 23, 42, 0.9);
            border: 1px solid #38bdf8;
        }
        #avatar-control-panel .btn {
            background-color: #1e293b;
            color: #38bdf8;
            border: 1px solid #334155;
            font-size: 0.9rem;
            width: auto;
            padding: 0 15px;
            height: 40px;
        }
        #avatar-control-panel .btn:active {
            background-color: #38bdf8;
            color: #0f172a;
        }

        .top-btn { position: absolute; top: 15px; background-color: white; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        #btn-save { left: 15px; }
        #btn-settings { right: 15px; }
        .blue-arrow { color: #0284c7; font-weight: bold; }
    </style>
</head>

    <script>
        const cameraRig = document.getElementById('camera-rig');
        const mainCamera = document.getElementById('main-camera');
        const aiAvatar = document.getElementById('ai-avatar');

        const moveSpeed = 0.15;
        const rotateSpeed = 2.8; 
        const cameraRadius = 0.42; 

        let activeInterval = null;

        function isPositionSafe(nextX, nextZ) {
            if (nextX + cameraRadius >= 13 || nextX - cameraRadius <= -13) return false;
            if (nextZ + cameraRadius >= 17 || nextZ - cameraRadius <= -17) return false;

            if (nextX - cameraRadius <= -2.5 && nextX >= -3.1) {
                if (!(nextZ > 8.0 && nextZ < 10.0) && !(nextZ > 4.75 && nextZ < 6.75) && !(nextZ > 1.0 && nextZ < 3.0) && !(nextZ > -5.0 && nextZ < -3.0) && !(nextZ > -10.0 && nextZ < -8.0)) {
                    return false;
                }
            }

            if (nextX + cameraRadius >= 2.5 && nextX <= 3.1) {
                if (!(nextZ > 8.0 && nextZ < 10.0) && !(nextZ > 4.75 && nextZ < 6.75) && !(nextZ > 1.0 && nextZ < 3.0) && !(nextZ > -5.0 && nextZ < -3.0) && !(nextZ > -10.0 && nextZ < -8.0)) {
                    return false;
                }
            }

            if (Math.abs(nextZ - 11) <= cameraRadius) {
                if (nextX < -2.5 || nextX > 2.5) return false;
            }

            if (Math.abs(nextZ - 7.5) <= cameraRadius || Math.abs(nextZ - 2.5) <= cameraRadius || Math.abs(nextZ + 4.5) <= cameraRadius || Math.abs(nextZ + 11) <= cameraRadius) {
                if (Math.abs(nextX) > 2.5) return false; 
            }

            return true; 
        }

        function startAction(actionFunction) {
            if (activeInterval) clearInterval(activeInterval);
            actionFunction(); 
            activeInterval = setInterval(actionFunction, 40); 
        }

        function stopAction() {
            if (activeInterval) {
                clearInterval(activeInterval);
                activeInterval = null;
            }
        }

        function setupButton(elementId, action) {
            const btn = document.getElementById(elementId);
            if (!btn) return;
            btn.addEventListener('touchstart', (e) => { e.preventDefault(); startAction(action); });
            btn.addEventListener('touchend', stopAction);
            btn.addEventListener('mousedown', () => startAction(action));
            btn.addEventListener('mouseup', stopAction);
            btn.addEventListener('mouseleave', stopAction);
        }

        // إعداد حركة المستخدم الثابتة
        setupButton('move-forward', () => {
            let pos = cameraRig.getAttribute('position');
            let rot = mainCamera.getAttribute('rotation');
            let angle = (rot.y * Math.PI) / 180;
            let nextX = pos.x - Math.sin(angle) * moveSpeed;
            let nextZ = pos.z - Math.cos(angle) * moveSpeed;
            if (isPositionSafe(nextX, nextZ)) { pos.x = nextX; pos.z = nextZ; cameraRig.setAttribute('position', pos); }
        });

        setupButton('move-back', () => {
            let pos = cameraRig.getAttribute('position');
            let rot = mainCamera.getAttribute('rotation');
            let angle = (rot.y * Math.PI) / 180;
            let nextX = pos.x + Math.sin(angle) * moveSpeed;
            let nextZ = pos.z + Math.cos(angle) * moveSpeed;
            if (isPositionSafe(nextX, nextZ)) { pos.x = nextX; pos.z = nextZ; cameraRig.setAttribute('position', pos); }
        });

        setupButton('strafe-left', () => {
            let pos = cameraRig.getAttribute('position');
            let rot = mainCamera.getAttribute('rotation');
            let angle = ((rot.y + 90) * Math.PI) / 180;
            let nextX = pos.x - Math.sin(angle) * moveSpeed;
            let nextZ = pos.z - Math.cos(angle) * moveSpeed;
            if (isPositionSafe(nextX, nextZ)) { pos.x = nextX; pos.z = nextZ; cameraRig.setAttribute('position', pos); }
        });

        setupButton('strafe-right', () => {
            let pos = cameraRig.getAttribute('position');
            let rot = mainCamera.getAttribute('rotation');
            let angle = ((rot.y + 90) * Math.PI) / 180;
            let nextX = pos.x + Math.sin(angle) * moveSpeed;
            let nextZ = pos.z + Math.cos(angle) * moveSpeed;
            if (isPositionSafe(nextX, nextZ)) { pos.x = nextX; pos.z = nextZ; cameraRig.setAttribute('position', pos); }
        });

        setupButton('move-up', () => {
            let pos = cameraRig.getAttribute('position');
            if(pos.y < 2.3) { pos.y += moveSpeed; cameraRig.setAttribute('position', pos); }
        });

        setupButton('move-down', () => {
            let pos = cameraRig.getAttribute('position');
            if(pos.y > 0.1) { pos.y -= moveSpeed; cameraRig.setAttribute('position', pos); }
        });

        setupButton('rotate-left', () => { let rot = mainCamera.getAttribute('rotation'); rot.y += rotateSpeed; mainCamera.setAttribute('rotation', rot); });
        setupButton('rotate-right', () => { let rot = mainCamera.getAttribute('rotation'); rot.y -= rotateSpeed; mainCamera.setAttribute('rotation', rot); });
        setupButton('turn-left', () => { let rot = mainCamera.getAttribute('rotation'); rot.y += rotateSpeed * 1.8; mainCamera.setAttribute('rotation', rot); });
        setupButton('turn-right', () => { let rot = mainCamera.getAttribute('rotation'); rot.y -= rotateSpeed * 1.8; mainCamera.setAttribute('rotation', rot); });

        // متحكمات حركة الافتار الجديد (AI Avatar)
        setupButton('avatar-forward', () => {
            let pos = aiAvatar.getAttribute('position');
            let rot = aiAvatar.getAttribute('rotation');
            let angle = (rot.y * Math.PI) / 180;
            pos.x += Math.sin(angle) * 0.1;
            pos.z += Math.cos(angle) * 0.1;
            aiAvatar.setAttribute('position', pos);
        });

        setupButton('avatar-back', () => {
            let pos = aiAvatar.getAttribute('position');
            let rot = aiAvatar.getAttribute('rotation');
            let angle = (rot.y * Math.PI) / 180;
            pos.x -= Math.sin(angle) * 0.1;
            pos.z -= Math.cos(angle) * 0.1;
            aiAvatar.setAttribute('position', pos);
        });

        setupButton('avatar-rotate', () => {
            let rot = aiAvatar.getAttribute('rotation');
            rot.y = (rot.y + 5) % 360;
            aiAvatar.setAttribute('rotation', rot);
        });
    </script>
</body>
</html>
