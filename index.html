<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Axis - تجربة تحريك المجسمات</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #1a1a1a;
            font-family: Arial, sans-serif;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
        }
        /* لوحة التحكم بالأزرار */
        .controls-panel {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            z-index: 10;
        }
        .btn {
            background: #00bcd4;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            transition: background 0.3s;
        }
        .btn:hover {
            background: #008ba3;
        }
    </style>
    <!-- استدعاء مكتبة Three.js ومستعرض المجسمات وأدوات التحكم -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/FBXLoader.js"></script>
    <!-- مكتبة fflate الضرورية لقراءة ملفات fbx المحملة أحياناً -->
    <script src="https://cdn.jsdelivr.net/npm/fflate@0.7.4/umd/index.min.js"></script>
</head>
<body>

    <div id="canvas-container"></div>

    <!-- أزرار التحكم بالحركات المتضمنة في المجسم -->
    <div class="controls-panel">
        <button class="btn" onclick="playAnimation(0)">الحركة 1</button>
        <button class="btn" onclick="playAnimation(1)">الحركة 2</button>
        <button class="btn" onclick="stopAllAnimations()">إيقاف الحركة</button>
    </div>

    <script>
        let scene, camera, renderer, controls, mixer;
        let animations = [];
        let clock = new THREE.Clock();

        function init() {
            const container = document.getElementById('canvas-container');

            // 1. إنشاء المشهد
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x222222);

            // 2. الكاميرا
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 1000);
            camera.position.set(0, 2, 5);

            // 3. الإضاءة
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
            dirLight.position.set(5, 10, 7);
            scene.add(dirLight);

            // 4. محرك الرندرة
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            // 5. التحكم بالكاميرا عبر السحب والماوس واللمس
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.target.set(0, 1, 0);

            // 6. تحميل المجسم ثلاثي الأبعاد
            // ملاحظة: قم بتغيير 'character.gltf' إلى اسم ومسار ملف مجسمك الفعلي
            const loader = new THREE.GLTFLoader(); 
            loader.load('character.gltf', function (gltf) {
                const model = gltf.scene;
                scene.add(model);

                // إعداد الأنيميشن والمتحكم بالحركة (Mixer)
                mixer = new THREE.AnimationMixer(model);
                animations = gltf.animations;

                // تشغيل الحركة الأولى تلقائياً إذا كانت موجودة
                if(animations.length > 0) {
                    mixer.clipAction(animations[0]).play();
                }

            }, undefined, function (error) {
                console.error('حدث خطأ أثناء تحميل المجسم:', error);
            });

            window.addEventListener('resize', onWindowResize);
            animate();
        }

        // تشغيل حركة معينة بناءً على الضغط على الزر
        function playAnimation(index) {
            if (mixer && animations[index]) {
                mixer.stopAllAction();
                const action = mixer.clipAction(animations[index]);
                action.fadeIn(0.5); // انتقال ناعم بين الحركات
                action.play();
            } else {
                alert("هذه الحركة غير متوفرة في ملف المجسم الحالي.");
            }
        }

        // إيقاف كل الحركات
        function stopAllAnimations() {
            if (mixer) {
                mixer.stopAllAction();
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // حلقة التحديث المستمر لإظهار الحركة
        function animate() {
            requestAnimationFrame(animate);
            
            const delta = clock.getDelta();
            if (mixer) mixer.update(delta);
            
            controls.update();
            renderer.render(scene, camera);
        }

        // تشغيل الكود عند فتح الصفحة
        init();
    </script>
</body>
</html>
