<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>متجر عمر المضيء - أكسيس 3D</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <style>
        .a-dialog, .a-dialog-container, .a-enter-vr, .a-enter-ar { display: none !important; visibility: hidden !important; pointer-events: none !important; }

        #nav-panel { position: fixed; top: 10px; right: 10px; z-index: 9999; background: white; border: 2px solid #D4AF37; padding: 10px; border-radius: 10px; width: 140px; }
        #management-ui { position: fixed; top: 10px; left: 10px; background: white; padding: 10px; border: 2px solid #28a745; border-radius: 10px; z-index: 9999; width: 185px; }
        
        #products-list-ui { position: fixed; top: 175px; left: 10px; background: rgba(255, 255, 255, 0.95); padding: 8px; border: 2px solid #D4AF37; border-radius: 10px; z-index: 9999; width: 185px; font-family: sans-serif; font-size: 12px; }
        #list-container { display: flex; flex-direction: row; gap: 8px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: thin; }
        
        .product-item { flex: 0 0 auto; display: flex; flex-direction: column; align-items: center; background: #f9f9f9; border: 1px solid #ddd; padding: 4px; border-radius: 6px; width: 55px; text-align: center; }
        .product-item span { max-width: 50px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-bottom: 3px; font-weight: bold; }
        .btn-delete { background: #ff4d4d; color: white; border: none; padding: 2px 5px; border-radius: 4px; cursor: pointer; font-size: 10px; font-weight: bold; width: 100%; }
        
        #avatar-ui { position: fixed; top: 10px; left: 50%; transform: translateX(-50%); background: rgba(0, 0, 0, 0.8); padding: 8px 12px; border: 2px solid #38bdf8; border-radius: 12px; z-index: 9999; display: flex; gap: 6px; }
        .avatar-btn { background: #0284c7; color: white; border: none; padding: 6px 10px; border-radius: 6px; font-weight: bold; font-size: 11px; cursor: pointer; }
        .avatar-btn:active { background: #38bdf8; }

        #custom-alert { display: none; position: fixed; bottom: 20px; right: 20px; background: #333; color: #fff; padding: 12px 25px; border-radius: 5px; z-index: 10000; font-weight: bold; }

        .btn-action { width: 100%; padding: 8px; margin-top: 5px; border-radius: 5px; border: none; cursor: pointer; font-weight: bold; color: white; }
        input { width: 90%; margin: 4px 0; padding: 5px; }

        .control-btn { position: fixed; width: 55px; height: 55px; background: rgba(212, 175, 55, 1); border: 2px solid white; border-radius: 50%; z-index: 9999; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; touch-action: none; font-size: 20px; }
        #up { bottom: 120px; left: 80px; } 
        #down { bottom: 20px; left: 80px; } 
        #left { bottom: 70px; left: 20px; } 
        #right { bottom: 70px; left: 140px; }
    </style>
</head>
<body>

    <div id="nav-panel">
        <button class="btn-action" style="background:#8B4513;" onclick="window.location.href='corridor.html'">🏃 العودة للممر</button>
    </div>

    <div id="avatar-ui">
        <button class="avatar-btn" id="av-fwd">🚶‍♂️ تقديم الأفتار</button>
        <button class="avatar-btn" id="av-back">🚶‍♂️ إرجاع الأفتار</button>
        <button class="avatar-btn" id="av-rot">🔄 تدوير</button>
    </div>

    <div id="management-ui">
        <input type="file" id="pImg" accept="image/*">
        <input type="text" id="pName" placeholder="اسم المنتج">
        <input type="number" id="pPrice" placeholder="السعر">
        <button class="btn-action" style="background:#28a745;" onclick="addItem()">نشر المنتج 🚀</button>
    </div>

    <div id="products-list-ui">
        <strong style="color: #333; display:block; margin-bottom: 5px; font-size: 11px;">📦 منتجات المتجر الحالية (اسحب لليسار):</strong>
        <div id="list-container"></div>
    </div>

    <div id="custom-alert"></div>

    <div id="up" class="control-btn">↑</div>
    <div id="down" class="control-btn">↓</div>
    <div id="left" class="control-btn">←</div>
    <div id="right" class="control-btn">→</div>

    <a-scene light="defaultLightsEnabled: false" vr-mode-ui="enabled: false">
        <a-entity light="type: ambient; color: #FFF; intensity: 2.5"></a-entity>
        <a-entity light="type: directional; color: #FFF; intensity: 1.2" position="-1 4 2"></a-entity>

        <a-plane position="0 0 0" rotation="-90 0 0" width="20" height="20" color="#E0F7FA" src="https://images.unsplash.com/photo-1523821741446-edb2b68bb7a0?auto=format&fit=crop&w=500&q=80" repeat="10 10" material="shader: flat;"></a-plane> 
        
        <a-box position="0 4 -10" width="20" height="8" depth="0.2" color="#FFFDD0" src="https://images.unsplash.com/photo-1533090161767-e6ffed986c88?auto=format&fit=crop&w=500&q=80" repeat="1 1" material="shader: flat;"></a-box> 
        <a-box position="0 4 10" width="20" height="8" depth="0.2" color="#FFFDD0" src="https://images.unsplash.com/photo-1533090161767-e6ffed986c88?auto=format&fit=crop&w=500&q=80" repeat="1 1" material="shader: flat;"></a-box> 
        <a-box position="-10 4 0" width="0.2" height="8" depth="20" color="#F5F5DC" src="https://images.unsplash.com/photo-1533090161767-e6ffed986c88?auto=format&fit=crop&w=500&q=80" repeat="1 1" material="shader: flat;"></a-box> 
        <a-box position="10 4 0" width="0.2" height="8" depth="20" color="#F5F5DC" src="https://images.unsplash.com/photo-1533090161767-e6ffed986c88?auto=format&fit=crop&w=500&q=80" repeat="1 1" material="shader: flat;"></a-box> 
        
        <a-box position="0 8 0" width="20" height="0.1" depth="20" color="#FFFFFF" material="shader: flat;"></a-box> 
        
        <a-box position="0 6 -9.8" width="6" height="1.2" depth="0.1" color="#8B4513">
            <a-text value="OMAR SHOP 102" align="center" position="0 0 0.1" color="#D4AF37" width="10"></a-text>
        </a-box>

        <!-- 🤖 أفتار أنيمي معدل الاتجاهات والحركة -->
        <a-entity id="store-avatar" position="0 0 -2" rotation="0 0 0">
            <!-- الرأس والوجه -->
            <a-sphere position="0 1.55 0" radius="0.22" color="#FFDFC4"></a-sphere>
            <a-cone position="0 1.75 0" radius-bottom="0.25" radius-top="0" height="0.2" color="#2b1704"></a-cone>
            <a-sphere position="-0.07 1.6 0.18" radius="0.035" color="#0F172A"></a-sphere>
            <a-sphere position="0.07 1.6 0.18" radius="0.035" color="#0F172A"></a-sphere>

            <!-- الجذع (القميص) -->
            <a-cylinder position="0 1.05 0" radius="0.2" height="0.65" color="#0284C7"></a-cylinder>

            <!-- الذراع الأيسر -->
            <a-entity id="arm-left" position="-0.25 1.25 0">
                <a-cylinder position="0 -0.25 0" radius="0.05" height="0.5" color="#0284C7"></a-cylinder>
                <a-sphere position="0 -0.52 0" radius="0.06" color="#FFDFC4"></a-sphere>
            </a-entity>

            <!-- الذراع الأيمن -->
            <a-entity id="arm-right" position="0.25 1.25 0">
                <a-cylinder position="0 -0.25 0" radius="0.05" height="0.5" color="#0284C7"></a-cylinder>
                <a-sphere position="0 -0.52 0" radius="0.06" color="#FFDFC4"></a-sphere>
            </a-entity>

            <!-- الرجل اليسرى -->
            <a-entity id="leg-left" position="-0.1 0.7 0">
                <a-cylinder position="0 -0.3 0" radius="0.065" height="0.6" color="#1E293B"></a-cylinder>
                <a-box position="0 -0.6 0.05" width="0.13" height="0.08" depth="0.2" color="#000000"></a-box>
            </a-entity>

            <!-- الرجل اليمنى -->
            <a-entity id="leg-right" position="0.1 0.7 0">
                <a-cylinder position="0 -0.3 0" radius="0.065" height="0.6" color="#1E293B"></a-cylinder>
                <a-box position="0 -0.6 0.05" width="0.13" height="0.08" depth="0.2" color="#000000"></a-box>
            </a-entity>

            <!-- منصة الارتكاز المضيئة -->
            <a-cylinder position="0 0.01 0" radius="0.45" height="0.02" color="#38BDF8" opacity="0.8"></a-cylinder>
        </a-entity>

        <a-entity id="product-display"></a-entity>

        <a-entity id="rig" position="0 1.6 5">
            <a-entity id="head" camera look-controls></a-entity>
        </a-entity>
    </a-scene>

    <script>
        let currentOffset = -7;
        const display = document.getElementById('product-display');
        const listContainer = document.getElementById('list-container');
        const avatar = document.getElementById('store-avatar');

        const armLeft = document.getElementById('arm-left');
        const armRight = document.getElementById('arm-right');
        const legLeft = document.getElementById('leg-left');
        const legRight = document.getElementById('leg-right');

        let walkAngle = 0;
        let isMoving = false;

        window.addEventListener('load', () => { refreshStore(); });

        function showNotification(msg) {
            const b = document.getElementById('custom-alert');
            b.innerText = msg; b.style.display = 'block';
            setTimeout(() => { b.style.display = 'none'; }, 2500);
        }

        function refreshStore() {
            display.innerHTML = ''; listContainer.innerHTML = ''; currentOffset = -7;
            const saved = JSON.parse(localStorage.getItem('omar_store_data')) || [];
            saved.forEach((item, index) => {
                const box = document.createElement('a-box');
                box.setAttribute('position', `${currentOffset} 1.5 -9.5`);
                box.setAttribute('width', '2.5'); box.setAttribute('height', '2.5'); box.setAttribute('depth', '0.2');
                box.setAttribute('material', {src: item.img, shader: 'flat'});
                display.appendChild(box);
                currentOffset += 3.5;

                const itemDiv = document.createElement('div');
                itemDiv.className = 'product-item';
                itemDiv.innerHTML = `<span>${item.name}</span><button class="btn-delete" onclick="deleteItem(${index})">حذف</button>`;
                listContainer.appendChild(itemDiv);
            });
        }

        function addItem() {
            const file = document.getElementById('pImg').files[0];
            const name = document.getElementById('pName').value;
            const price = document.getElementById('pPrice').value;

            if (file && name && price) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const saved = JSON.parse(localStorage.getItem('omar_store_data')) || [];
                    saved.push({ img: e.target.result, name, price });
                    localStorage.setItem('omar_store_data', JSON.stringify(saved));
                    refreshStore();
                    showNotification("🚀 تم نشر وتأكيد حفظ المنتج!");
                    document.getElementById('pName').value = ''; document.getElementById('pPrice').value = ''; document.getElementById('pImg').value = '';
                };
                reader.readAsDataURL(file);
            } else { showNotification("⚠️ الرجاء إكمال جميع الحقول أولاً!"); }
        }

        function deleteItem(index) {
            let s = JSON.parse(localStorage.getItem('omar_store_data')) || [];
            s.splice(index, 1);
            localStorage.setItem('omar_store_data', JSON.stringify(s));
            refreshStore();
            showNotification("🗑️ تم حذف المنتج بنجاح!");
        }

        // محاكاة المشي للأفتار
        function animateAvatar() {
            if (isMoving) {
                walkAngle += 0.15;
                let rotArm = Math.sin(walkAngle) * 25;
                let rotLeg = Math.sin(walkAngle) * 20;

                armLeft.setAttribute('rotation', `${rotArm} 0 0`);
                armRight.setAttribute('rotation', `${-rotArm} 0 0`);
                legLeft.setAttribute('rotation', `${-rotLeg} 0 0`);
                legRight.setAttribute('rotation', `${rotLeg} 0 0`);
            } else {
                armLeft.setAttribute('rotation', '0 0 0');
                armRight.setAttribute('rotation', '0 0 0');
                legLeft.setAttribute('rotation', '0 0 0');
                legRight.setAttribute('rotation', '0 0 0');
            }
        }

        function moveAvatar(dz) {
            let pos = avatar.getAttribute('position');
            pos.z += dz;
            avatar.setAttribute('position', pos);
            isMoving = true;
            setTimeout(() => { isMoving = false; }, 300);
        }

        document.getElementById('av-fwd').addEventListener('click', () => moveAvatar(-0.3));
        document.getElementById('av-back').addEventListener('click', () => moveAvatar(0.3));
        document.getElementById('av-rot').addEventListener('click', () => {
            let rot = avatar.getAttribute('rotation');
            rot.y += 30;
            avatar.setAttribute('rotation', rot);
        });

        setInterval(animateAvatar, 30);

        // التحكم بالكاميرا
        var rig = document.getElementById('rig'); var head = document.getElementById('head');
        var keys = {up: false, down: false, left: false, right: false};
        function setupBtn(id, k) {
            var b = document.getElementById(id);
            b.addEventListener('touchstart', (e)=>{e.preventDefault(); keys[k]=true;});
            b.addEventListener('touchend', (e)=>{e.preventDefault(); keys[k]=false;});
            b.addEventListener('mousedown', ()=>{keys[k]=true;});
            b.addEventListener('mouseup', ()=>{keys[k]=false;});
        }
        setupBtn('up','up'); setupBtn('down','down'); setupBtn('left','left'); setupBtn('right','right');

        setInterval(() => {
            var pos = rig.getAttribute('position'); var rot = head.getAttribute('rotation');
            var ang = rot.y * Math.PI / 180; var s = 0.15;
            let nextX = pos.x; let nextZ = pos.z;

            if(keys.up){ nextX -= Math.sin(ang)*s; nextZ -= Math.cos(ang)*s; }
            if(keys.down){ nextX += Math.sin(ang)*s; nextZ += Math.cos(ang)*s; }
            if(keys.left){ nextX -= Math.cos(ang)*s; nextZ += Math.sin(ang)*s; }
            if(keys.right){ nextX += Math.cos(ang)*s; nextZ -= Math.sin(ang)*s; }
            
            if (nextX > -9.2 && nextX < 9.2 && nextZ > -9.2 && nextZ < 9.2) {
                pos.x = nextX; pos.z = nextZ;
            }
            rig.setAttribute('position', pos);
        }, 20);
    </script>
</body>
</html>
